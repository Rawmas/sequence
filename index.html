<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Skin | The Logic of Layering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Adjusted for the Blue theme */
            --bg: #0d1b2a;
            --text: #ffffff;
            --accent: #d0dbe5; /* Cool blue-white for accents */
            --glass: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            /* Direct link to the Blue Cosmetic Textures image */
            background: linear-gradient(rgba(13, 27, 42, 0.4), rgba(13, 27, 42, 0.4)), 
                        url('https://images.unsplash.com/photo-1616683693504-3ea7e9ad6fec?q=80&w=2560&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 0.2em;
            font-size: 2.5rem;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        .tagline {
            font-weight: 400;
            letter-spacing: 0.1em;
            margin-bottom: 3em;
            color: var(--accent);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .logic-grid {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .step {
            /* Icy glass effect */
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 30px 15px;
            width: 110px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .step:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255,255,255,0.6);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        .number { font-weight: 600; font-size: 1.8em; display: block; margin-bottom: 5px; }
        .label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 0.15em; color: #fff; }
        .footer-text { max-width: 450px; line-height: 1.8; color: var(--accent); font-size: 0.95em; margin-top: 20px; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <h1>Sequence Skin</h1>
    <p class="tagline">Science-based skincare.</p>

    <div class="logic-grid">
        <div class="step"><span class="number">0</span><span class="label">Prime</span></div>
        <div class="step"><span class="number">1</span><span class="label">Correct</span></div>
        <div class="step"><span class="number">2</span><span class="label">Moisturize</span></div>
        <div class="step"><span class="number">3</span><span class="label">Protect</span></div>
    </div>

    <p class="footer-text">Refining the sequence for logic-driven results.<br>Launching soon.</p>

</body>
</html>
