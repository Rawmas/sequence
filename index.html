<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Skin | The Logic of Layering</title>
    <style>
        :root {
            --bg: #fafafa;
            --text: #1a1a1a;
            --accent: #555;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 0.5em;
        }
        .logic-grid {
            display: flex;
            gap: 20px;
            margin: 40px 0;
        }
        .step {
            border: 1px solid #ddd;
            padding: 20px;
            width: 80px;
            border-radius: 4px;
        }
        .number { font-weight: bold; font-size: 1.2em; display: block; }
        .label { font-size: 0.7em; text-transform: uppercase; color: var(--accent); margin-top: 5px; }
        p { max-width: 400px; line-height: 1.6; color: var(--accent); }
    </style>
</head>
<body>

    <h1>Sequence Skin</h1>
    <p>Science-based skincare. Logic-driven results.</p>

    <div class="logic-grid">
        <div class="step"><span class="number">0</span><span class="label">Mist</span></div>
        <div class="step"><span class="number">1</span><span class="label">Active</span></div>
        <div class="step"><span class="number">2</span><span class="label">Barrier</span></div>
        <div class="step"><span class="number">3</span><span class="label">SPF</span></div>
    </div>

    <p>Refining the sequence. Launching soon.</p>

</body>
</html>
