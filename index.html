<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequence Skin | The Logic of Layering</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Clinical Blue Theme Colors */
            --bg: #0d1b2a;
            --text: #ffffff;
            --accent: #e0e6ed;
            --glass: rgba(255, 255, 255, 0.12); /* Slightly clearer glass */
        }

        body {
            font-family: 'Inter', sans-serif;
            
            /* HIGH-FIDELITY BACKGROUND SETTINGS */
            background-image: linear-gradient(rgba(13, 27, 42, 0.4), rgba(13, 27, 42, 0.4)), 
                              url('https://plus.unsplash.com/premium_photo-1764757496907-331948c564f4?q=80&w=1047&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            
            background-size: cover;          /* Ensures image covers the screen without stretching */
            background-position: 50% 50%;    /* Locks the center of the image to the center of the screen */
            background-repeat: no-repeat;    /* Prevents the image from tiling on huge monitors */
            background-attachment: fixed;    /* The image stays still while you scroll (Parallax effect) */
            
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 0.35em; /* Increased spacing for a more "luxury" feel */
            text-transform: uppercase;
            margin-bottom: 0.3em;
            font-size: 2.5rem;
            text-shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        .tagline {
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 4em;
            color: var(--accent);
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .logic-grid {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .step {
            /* REFINED GLASS EFFECT */
            background: var(--glass);
            backdrop-filter: blur(12px);          /* Standard blur */
            -webkit-backdrop-filter: blur(12px);  /* Safari blur support */
            border: 1px solid rgba(255,255,255,0.15);
            padding: 35px 20px;
            width: 100px;
            border-radius: 4px; /* Sharper corners feel more "medical/clinical" than round ones */
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .step:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255,255,255,0.5);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .number { 
            font-weight: 600; 
            font-size: 1.6em; 
            display: block; 
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .label { 
            font-size: 0.65em; 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
            color: #fff; 
            opacity: 0.8;
        }

        .footer-text { 
            max-width: 450px; 
            line-height: 1.8; 
            color: var(--accent); 
            font-size: 0.85em; 
            margin-top: 30px; 
            text-shadow: 0 1px 3px rgba(0,0,0,0.6); 
            letter-spacing: 0.05em;
        }
        
        /* Mobile Optimization */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; letter-spacing: 0.2em; }
            .logic-grid { gap: 10px; }
            .step { width: 70px; padding: 20px 10px; }
            .number { font-size: 1.4em; }
            .label { font-size: 0.55em; letter-spacing: 0.1em; }
        }
    </style>
</head>
<body>

    <h1>Sequence Skin</h1>
    <p class="tagline">Science-Based Skincare</p>

    <div class="logic-grid">
        <div class="step"><span class="number">0</span><span class="label">Prime</span></div>
        <div class="step"><span class="number">1</span><span class="label">Correct</span></div>
        <div class="step"><span class="number">2</span><span class="label">Moisturize</span></div>
        <div class="step"><span class="number">3</span><span class="label">Protect</span></div>
    </div>

    <p class="footer-text">Refining the sequence.<br>Launching soon.</p>

</body>
</html>
